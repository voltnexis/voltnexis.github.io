<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>VoltNexis – We’ve moved to our official domain</title>

  <meta name="description" content="VoltNexis has moved to its official domain. Visit voltnexis.in for the latest tools, services, and updates." />

  <!-- Prevent this old page from ranking over your new one -->
  <meta name="robots" content="noindex, follow" />

  <meta property="og:title" content="VoltNexis has moved" />
  <meta property="og:description" content="Visit our official website at voltnexis.in" />
  <meta property="og:url" content="https://voltnexis.in/" />

  <style>

      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 30px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.1rem;
      color: #94a3b8;
    }

    a.button {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 500;
      transition: 0.2s;
    }

    a.button:hover {

    }

    .note {

      font-size: 0.9rem;
